services:
  - type: web
    name: orbit
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      # Set these in the Render dashboard (never commit secrets):
      # SUPABASE_URL
      # SUPABASE_SERVICE_ROLE_KEY
      # FRONTEND_URL  (your Netlify URL, e.g. https://orbit-tools.netlify.app)
